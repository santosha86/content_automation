# Video output
video:
  width: 1080
  height: 1920
  fps: 30
  target_seconds: 40        # writer aims for this spoken length
  max_segments: 6

# Voice
voice:
  # kokoro = free local TTS, runs on your Mac, no API cost (default).
  # elevenlabs = paid API with emotional audio tags — set provider: elevenlabs and add
  # ELEVENLABS_API_KEY to .env to use it instead.
  provider: kokoro
  kokoro_voice: am_michael    # energetic US male narrator; try am_puck / af_heart / am_adam
  # used only when provider: elevenlabs. eleven_v3 = audio tags ([excited], [curious]...).
  model: eleven_v3

# Captions
captions:
  font: "Arial Black"
  font_size: 96
  words_per_chunk: 3        # words shown per caption card
  highlight_color: "&H00FFD900"   # ASS BGR: cyan-ish yellow accent

# Whisper (caption timing)
whisper:
  model: small
  compute_type: int8

# Music bed. Soft ambient pads are synthesized per mood (tech_minimal|suspense|driving|
# uplift|calm); drop royalty-free mp3s in assets/music/<mood>/ to override with real tracks.
music:
  synth_volume: 0.55   # gain for generated pads (lower = subtler under the voice)
  track_volume: 0.10   # gain for real mp3s you drop in (they're mastered loud)

# Virality pre-check: stories scored 0-100 before render; below min_score the top
# candidate is flagged as a weak news day (logged, never hard-blocks in auto mode).
virality:
  min_score: 55

# Branded end-card (reference rule: one reusable end-card, identical every video, last ~2s)
branding:
  name: "SIGNAL"
  handle: "@signal.ai"
  tagline: "AI news, decoded daily"
  bg_color: "0x0B1020"          # ffmpeg color for the card background
  accent_color: "&H0000D9FF"    # ASS BGR for the brand name (matches caption accent)
  endcard_seconds: 2.0

# Scout
scout:
  max_candidates: 25        # articles considered per run
  max_age_hours: 48
  # Trend lanes (free): Hacker News + these subreddits feed hotter candidates into ranking.
  subreddits: [artificial, MachineLearning, LocalLLaMA, OpenAI, singularity, ChatGPT]
